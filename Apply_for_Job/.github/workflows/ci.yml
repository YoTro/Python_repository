name: CI

on:
  push:
    branches: ["master", "main"]
    paths:
      - "Apply_for_Job/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: ["master", "main"]
    paths:
      - "Apply_for_Job/**"

defaults:
  run:
    working-directory: Apply_for_Job

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: Apply_for_Job/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest pytest-cov

      - name: Lint (flake8)
        run: |
          # Stop on syntax errors or undefined names; warn on style issues
          flake8 src/ main.py \
            --max-line-length=120 \
            --extend-ignore=E203,W503 \
            --exclude=src/job51/nc_env/

      - name: Run tests
        env:
          # Stub keys so import-time env checks don't fail in unit tests
          ANTHROPIC_API_KEY: "test-key"
          OPENAI_API_KEY: "test-key"
          DEEPSEEK_API_KEY: "test-key"
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: Apply_for_Job/coverage.xml
          flags: apply-for-job
          fail_ci_if_error: false
