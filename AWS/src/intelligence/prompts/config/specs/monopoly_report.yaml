id: monopoly_report
version: "1.0.0"
scope: batch
token_budget: 32000
role_id: senior_strategist
framework_ids:
  - psi_benchmarking
  - monopoly_thresholds
  - strategic_analysis
include_system_in_prompt: true

required_vars:
  - data_quality
  - recommended_capital
  - capital_units
  - niche_median_price
  - capital_cogs_pct
  - capital_inventory
  - capital_acos_pct
  - capital_sell_months
  - capital_ppc
  - capital_fees_pct
  - capital_fees
  - capital_overhead
  - tier_capitals
  - main_keyword
  - data_confidence_r2
  - niche_monthly_units
  - niche_monthly_gmv
  - bid_insight
  - review_disparity
  - industry_typical_cr3
  - social_psi
  - social_verdict
  - deal_intensity
  - price_trend
  - churn_pattern
  - churn_score
  - new_product_ratio
  - collapse_rate
  - bsr_churn_label
  - bsr_snapshots
  - bsr_churn_3m
  - bsr_churn_6m
  - bsr_churn_12m
  - new_entrant_ratio
  - seasonality_pattern
  - seasonality_score
  - seasonality_source
  - seasonality_n_points
  - peak_months
  - integrity_alert
  - integrity_hist_cov
  - integrity_ratio_cov
  - top_asin_table
  - price_distribution
  - n
  - total_bsr
  - compliance_risks
  - analysis_result
  - opportunity_signals
  - monopoly_score
  - monopoly_status
  - category_cvr
  - category_cvr_source
  - median_cpc
  - estimated_steady_state_acos
  - ad_profit_drag
  - fba_fee_pct
  - breakeven_acos
  - ad_burden_verdict
  - return_rate_pct
  - capital_gross_units

optional_vars:
  core_keywords: "(none)"
  brand_social_data: "[]"
  concentration_data: "{}"
  critical_reviews_data: "{}"
  integrity_ratio_threshold: "50%"
  demand_trend: "unknown"
  yoy_1y_pct: "N/A"
  yoy_2y_pct: "N/A"
  yoy_peak_1y_pct: "N/A"
  bsr_dataset_url: "N/A"

output_schema: null

# NOTE: this template is prepended with assemble_report_instructions(role_id, framework_ids)
# at workflow build time. See build_category_monopoly_analysis() in category_monopoly_analysis.py.
template: |
  ### DATA QUALITY
  {data_quality}
  MANDATORY CAVEAT RULE: for any metric whose underlying data source has coverage < 50% of BSR products, you MUST prefix the claim with '(limited data — N/M ASINs)' and treat it as directional only, not a precise benchmark. Specifically:
  - If Xiyouzhaoci ≥60-day history < 50%: prefix price_trend, integrity signals 1 & 2, and churn_pattern with '(limited history — N/M ASINs)'. EXCEPTION: if seasonality_source == 'keyword_weekly_trends', do NOT apply this caveat to seasonality — keyword ABA data is independent of Xiyouzhaoci BSR history.
  - If sales estimate coverage < 50%: prefix recommended_capital and any sales-derived figure with '(estimated from thin data)'
  - If brand coverage < 50%: prefix brand concentration claims with '(limited brand data — N/M ASINs)'
  - If CPC keyword entries = 0: write 'CPC data unavailable — bid barrier analysis skipped' instead of citing bid_insight
  - If Sellersprite BSR snapshots < 2: treat bsr_churn signals as insufficient and write 'BSR metabolism data unavailable'
  NEVER present a default value (e.g. 0, Unknown, N/A) as a confirmed fact.

  ### TASK-SPECIFIC CONTEXT
  Advising on a **{recommended_capital}** minimum launch budget ({capital_units} units × {niche_median_price} median price).
  DATA BREAKDOWN TABLE FORMAT (applies to every row in the table, no exceptions):
  - Header row MUST be exactly: `| Metric | Value | Definition |`
  - Separator row MUST be exactly: `| :--- | :--- | :--- |` — NEVER vary the dash count; never match it to cell width.
  - Definition cells: plain English, ≤ 100 characters. NO JSON, NO raw API payloads, NO multi-line text, NO formulas inside a cell.
  - If a Definition would exceed 100 chars, summarise it: keep the key number or label, cut the rest.
  - Escape any literal pipe character inside a cell as `\|` so the table does not break.
  - NEVER place the analysis_result, bid_insight JSON, or any other raw data block inside a table cell — those are rendered in their own dedicated sections.

  CAPITAL TABLE RULE: In the Data Breakdown table, Investment Capital MUST appear as FIVE consecutive rows — never collapsed into one:
    Row 1: Metric='Investment Capital (Total)' | Value='{recommended_capital}' | Definition='Subtotal × 1.20 working-capital buffer'
    Row 2: If capital_gross_units == capital_units (no return rate data): Metric='  └ Inventory ({capital_units} units, COGS {capital_cogs_pct})' | Value='{capital_inventory}' | Definition='{capital_units} units × {niche_median_price} × {capital_cogs_pct} COGS'. If capital_gross_units ≠ capital_units (return rate available): Metric='  └ Inventory ({capital_gross_units} gross units ordered to net {capital_units} sold, COGS {capital_cogs_pct})' | Value='{capital_inventory}' | Definition='{capital_gross_units} gross units × {niche_median_price} × {capital_cogs_pct} COGS (grossed up for {return_rate_pct} return rate)'
    Row 3: Metric='  └ PPC Seed ({capital_acos_pct} ACOS on {capital_units} units, ~{capital_sell_months}mo sell-through)' | Value='{capital_ppc}' | Definition='{capital_units} units × {niche_median_price} × {capital_acos_pct} ACOS'
    Row 4: Metric='  └ Platform Fees ({capital_fees_pct} on {capital_units} units)' | Value='{capital_fees}' | Definition='{capital_units} units × {niche_median_price} × {capital_fees_pct} (referral 15% + FBA from 2026 fee schedule, Large Standard 12-16 oz at median price)'
    Row 5: Metric='  └ Fixed Overhead' | Value='{capital_overhead}' | Definition='Photography, A+ content, listing, inbound freight'
  NEVER show a single Investment Capital row without these four sub-rows.
  BIMODAL CAPITAL RULE: tier_capitals={tier_capitals}. If tier_capitals is non-empty (bimodal market detected), append a second capital table immediately after the breakdown rows under the sub-heading '### Capital by Price Tier' with columns: Tier | Tier Median | Inventory | PPC | Fees | Overhead | Total. Warn the operator: 'The base Investment Capital above uses the overall median price which falls in the gap between tiers — choose the tier you plan to enter and use the corresponding Total as your actual budget.'
  Category Return Rate: {return_rate_pct} (source: Amazon Marketplace Product Guidance via SellerSprite — avg_return_rate_pct is the average return rate of same-type sub-categories over the past 3 months; return rate = returns ÷ total purchases in the past 3 months; e.g. under Shoes the figure is averaged across 18 sub-categories such as Women's Road Running and Men's Road Running). Add one row to the Data Breakdown table: Metric='Category Return Rate' | Value='{return_rate_pct}' | Definition='Avg return rate of same-type sub-categories, past 3 months (Amazon Marketplace Product Guidance); >5% warrants a return-buffer reserve'. If return_rate_pct is 'N/A', omit this row.
  Primary Niche: **{main_keyword}** | Related Terms: {core_keywords}
  Data Confidence (R²): **{data_confidence_r2}**

  ### DYNAMIC BENCHMARKS
  - Median Price: {niche_median_price}
  - Est. Niche Monthly Unit Sales: {niche_monthly_units} (scraped from Amazon 'X+ bought in past month' badge — unit count, NOT revenue)
  - Est. Niche Monthly GMV: {niche_monthly_gmv} (= unit_sales × median_price; use as market-size proxy)
  UNIT/REVENUE RULE: '{niche_monthly_units}' is a unit COUNT — NEVER prefix it with $. '{niche_monthly_gmv}' is revenue — always use the $ prefix. In the Data Breakdown table, report BOTH as separate rows: 'Total Est. Monthly Unit Sales' (integer, e.g. 40,694 units) and 'Est. Niche Monthly GMV' (dollar figure, e.g. $702,400). NEVER merge them into a single 'Total Est. Monthly Sales $...' row.
  - Keyword Bid Recommendations: {bid_insight}
    Structure: {{LEGACY_FOR_SALES: [...], AUTO_FOR_SALES: [...]}}. Each entry has targetingExpression (keyword + matchType) and suggestedBid (startBid / endBid). Render as a separate markdown table (NOT inside the Data Breakdown table) with header `| Keyword | Match Type | Manual CPC (LEGACY) | Auto CPC (AUTO) |` and separator `| :--- | :--- | :--- | :--- |`. One row per keyword; merge LEGACY and AUTO bids for the same keyword onto one row. LEGACY = flat manual bid. AUTO = Amazon dynamic estimate (usually higher). A large LEGACY→AUTO gap signals the platform rates this keyword as highly contested.
  - Review Disparity: {review_disparity}
  - Market Concentration: from concentration_data. Render as SEVEN consecutive rows in the Data Breakdown table (in this order):
    Row 1: 'Brand CR3 (Position)' | brand.cr3_position as % | 'Top-3 brands' share of BSR rank slots'
    Row 2: 'Brand CR5 (Position)' | brand.cr5_position as % | 'Top-5 brands' share of BSR rank slots'
    Row 3: 'Brand CR3 (Sales)' | brand.cr3_sales as % or '—' if null | 'Top-3 brands' share of monthly units'
    Row 4: 'Typical Industry CR3 (Benchmark)' | {industry_typical_cr3} | 'Category norm; DOJ: >40% = moderate concentration'
    Row 5: 'HHI (Brand, Position)' | brand.hhi_position to 4 dp | 'Herfindahl index: <0.10 fragmented · 0.10–0.18 moderate · >0.18 concentrated'
    Row 6: 'Seller CR3 (Position)' | if seller_id_coverage_pct < 0.50: '{{seller.cr3_position as %}}* (low coverage — {{seller.n_asins_with_seller_id}}/{{n_products}} ASINs only)' else seller.cr3_position as % or 'N/A — seller IDs unavailable' | 'Top-3 sellers' share of BSR slots; * = unreliable, <50% seller ID coverage'
    Row 7: 'HHI (Seller, Position)' | if seller_id_coverage_pct < 0.20: 'unreliable (<20% coverage)' elif seller_id_coverage_pct < 0.50: '{{seller.hhi_position to 4 dp}}* (low coverage)' else seller.hhi_position to 4 dp or 'N/A' | 'Seller-level Herfindahl index; * = treat as directional only'
  - Monopoly Score: {monopoly_score}/100 — {monopoly_status}
  - Social PSI: {social_psi} ({social_verdict}) [Category keyword, best signal across platforms — see Brand Social Signals below for brand-level breakdown]
  - Brand Social Signals: {brand_social_data}
    JSON array of multi-platform social results for top BSR brands and new-entrant brands (listed within past 12 months). Each entry: {{brand, is_top_brand, is_new_entrant, psi (max across platforms), verdict (from best platform), video_count (total), n_kol (KOL count — macro/mega tier creators, ≥500K followers, summed across platforms), n_koc (KOC/micro-influencer count — nano/micro tier, <100K followers, summed across platforms), unique_creators (all unique creator accounts across platforms; YouTube creators counted but not tiered — follower data unavailable on hashtag pages), platforms: [{{name, hashtag, psi, verdict, video_count, n_kol, n_koc, unique_creators}}, ...]}}. Render as a compact markdown table under the heading '## Brand Social Signals' (immediately after the Data Breakdown table, before Strategic Insights) with columns: Brand | Best PSI | Verdict | TikTok PSI | YouTube PSI | Total Videos | KOLs | KOCs | Category. In the 'Category' column write: 'Top Brand' if is_top_brand only, 'New Entrant' if is_new_entrant only, 'Top + New' if both, or '—' if neither. For TikTok PSI and YouTube PSI, look up psi from the platforms array by name; write '—' if the platform has psi=0 or verdict='No Tag Found'. KOLs = n_kol (macro+mega influencers, typically paid engagements); KOCs = n_koc (nano+micro creators, typically organic or lower-cost seeding). Sort by Best PSI descending. If brand_social_data is '[]' or empty, write one line: 'No brand social data available.'
    KOL/KOC INVESTMENT ALERT rule (apply in Strategic Insights): A brand with n_kol ≥ 3 (across platforms) is running a structured paid influencer campaign — this requires substantial capital (macro/mega fees range from $500–$50,000+ per post) and represents a meaningful off-platform moat. A brand with n_kol=0 but n_koc ≥ 5 is doing lower-cost seeding (nano/micro creators). If the category leader has n_kol ≥ 3 but new entrants have n_kol=0, flag the asymmetry: 'Incumbent brands are investing in paid KOL campaigns; new entrants without equivalent budget face an off-platform spend gap in addition to PPC costs.'
  - Deal Intensity: {deal_intensity}/10

  ### STEADY-STATE AD BURDEN
  Derived from market-level data only — no owned product required.
  Formula: Estimated ACOS = median_cpc ÷ (median_price × category_cvr × (1 − return_rate)). When return_rate_pct is 'N/A' the (1 − return_rate) term is omitted (equals 1). Both CPC and CVR sourced from the Amazon Ads ecosystem for internal consistency. Returns reduce effective ad revenue per click because the sale is reversed after the ad spend is already sunk.
  - Category CVR: {category_cvr} (source: {category_cvr_source})
  - Median CPC: {median_cpc}
  - Estimated Steady-State ACOS: {estimated_steady_state_acos}
  - Breakeven ACOS: {breakeven_acos} (= 1 − 30% COGS − 15% referral − {fba_fee_pct} FBA [Large Standard 12-16 oz at median price, 2026 schedule])
  - Ad Profit Drag: {ad_profit_drag} (= BSR ad traffic ratio × estimated ACOS; fraction of revenue consumed by ads at steady state)
  - Ad Burden Verdict: **{ad_burden_verdict}**
  In the Data Breakdown table, render these as six consecutive rows under the group heading 'Steady-State Ad Burden'. NEVER omit category_cvr or the breakeven ACOS formula components — they are the basis for the verdict.

  ### MARKET HEALTH SIGNALS
  - Price Trend: {price_trend}
  - Rating Churn Pattern: {churn_pattern} (score: {churn_score})
  - Low-Review BSR Share: {new_product_ratio} (snapshot — % of current BSR products with < 50 reviews; high value = BSR positions not yet defended by social proof, low entry stickiness) | Rating Collapse Rate: {collapse_rate} (% of Xiyouzhaoci-tracked products where first-half peak rating dropped > 0.3★ vs second-half average)
  - BSR Listing Metabolism: **{bsr_churn_label}** | Snapshots: {bsr_snapshots}
    - 3-Month Churn: {bsr_churn_3m} | 6-Month Churn: {bsr_churn_6m} | 12-Month Churn: {bsr_churn_12m}
  - New Entrant Ratio (Sellersprite T-snapshot): {new_entrant_ratio}
  - Seasonality: {seasonality_pattern} (score: {seasonality_score}, source: {seasonality_source}, n={seasonality_n_points} data points) | Peak Months: {peak_months}
    Source legend: 'keyword_weekly_trends' = ABA weekly search-volume (direct consumer intent, independent of BSR history); 'bsr_daily_trends' = Xiyouzhaoci BSR proxy (indirect — reflects competitive rank, not raw demand). Prefer keyword source when available.
  - Demand Trend (YOY): {demand_trend} | Annual 1Y: {yoy_1y_pct} | Annual 2Y: {yoy_2y_pct} | Peak-Window 1Y: {yoy_peak_1y_pct}
    Only populated when seasonality_source == 'keyword_weekly_trends' (ABA 3-year weekly data). 'unknown' or 'N/A' means BSR-proxy source was used — omit this row from the Data Breakdown table in that case.
    Peak-window 1Y compares the mean search volume in detected peak months across consecutive 52-week windows; Annual 1Y uses the full-year mean. When both are available, peak-window is the primary verdict signal. Add ONE row to the Data Breakdown table: Metric='Demand Trend (YOY)' | Value='{demand_trend} ({yoy_peak_1y_pct} peak / {yoy_1y_pct} annual, 2Y: {yoy_2y_pct})' | Definition='YOY change in ABA weekly search volume — peak-window and annual mean across 52-week windows'.
  - Integrity Alert: {integrity_alert}
    Coverage — Signal 1+2 (rating history): {integrity_hist_cov}
    Coverage — Signal 3 (written/global ratio): {integrity_ratio_cov}
  INTEGRITY TABLE RULE: In the Data Breakdown table, the Integrity Alert block MUST occupy THREE consecutive rows (never collapse into one):
    Row 1: Metric='Integrity Alert' | Value=LOW/MEDIUM/HIGH/unknown | Definition=trigger ratio vs threshold (e.g. 'RSR 0/8, ratio 0/15, threshold >30%')
    Row 2: Metric='Integrity: Rating History Coverage' | Value='{integrity_hist_cov}' | Definition=ASINs with ≥60-day Xiyouzhaoci history; basis for Signal 1 RSR + Signal 2 rating-jump
    Row 3: Metric='Integrity: Review Ratio Coverage' | Value='{integrity_ratio_cov}' | Definition=ASINs with written/global ratio data; flags ratio > {integrity_ratio_threshold} (natural ≈ 10%); basis for Signal 3
  If either coverage is below 20%, append '(low coverage — treat as directional only)' to the Integrity Alert value cell.

  ### TOP ASIN EVIDENCE TABLE
  {top_asin_table}
  Render the above JSON as a markdown table with these exact columns (in this order): Rank | ASIN | Brand | Title | Price | Rating | Reviews | Feedback | Review Ratio | Units/Mo | Fulfillment. Title: truncate at 40 chars with '…'. Feedback = feedback_count (number of Amazon seller-feedback entries for this ASIN's seller; 'N/A' if unavailable). Review Ratio = review_ratio rendered as a percentage (e.g. 12.34%); this is written_reviews ÷ global_ratings — a ratio far above ~10% may indicate review manipulation (cross-reference Integrity Alert). Place this table immediately after the Data Breakdown section under the heading '## Top 10 BSR Products (Evidence)'. Below the table add one line: '*Source: Amazon BSR page scrape + PastMonthSales badge. Units/Mo = Amazon-displayed past-month purchase count. Review Ratio = written reviews ÷ global ratings (natural ≈ 10%).*'
  BSR DATASET DOWNLOAD RULE: bsr_dataset_url={bsr_dataset_url}. If bsr_dataset_url is not 'N/A', append a second line immediately below the source footnote: '📥 **[Download full BSR dataset ({bsr_dataset_url})]({bsr_dataset_url})** — all enriched rows (rank, ASIN, title, brand, price, rating, reviews, monthly sales estimate, seller type, review ratio, product URL).' If bsr_dataset_url is 'N/A', omit this line entirely.

  ### BRAND & SELLER CONCENTRATION
  {concentration_data}
  Render under the heading '## Brand & Seller Concentration' immediately after the Top 10 BSR Products section.
  The scalar CR3/CR5/HHI metrics are already in the Data Breakdown table — do NOT repeat them here.
  STRUCTURE (render ALL of the following sub-sections):
  1. **Top Brands by Position** — inline sentence: 'Top N brands by BSR slots: Brand A (X slots, Y%), Brand B …' (list top-5 from brand.top_brands_by_position)
  2. **Top Brands by Sales** — inline sentence listing top-5 from brand.top_brands_by_sales with monthly_units and sales_share%. Omit if brand.top_brands_by_sales is empty.
  3. **Multi-Brand Sellers** — if seller.n_multi_brand_sellers > 0: render as a small table with columns: Seller ID (last 6 chars) | Brands Owned | Positions | Monthly Units | Position Share. Each row is one entry from seller.multi_brand_sellers. Add note: 'A single seller controlling multiple brands indicates seller-level monopoly stronger than brand-level metrics suggest.' If n_multi_brand_sellers == 0 and n_sellers_identified > 0: write 'No seller owns more than one brand in this BSR sample.' If n_sellers_identified == 0: write 'Seller IDs unavailable — seller-level analysis skipped.'
  SELLER ID COVERAGE RULE (MANDATORY — evaluate before rendering any seller-level metric):
  Check seller.seller_id_coverage_pct and seller.n_asins_with_seller_id against n_products.
  - If seller_id_coverage_pct < 0.50: you MUST open the seller sub-section with this disclaimer block (verbatim, before any table or metric):
    > ⚠️ **Seller ID coverage: {{seller.n_asins_with_seller_id}}/{{n_products}} ASINs ({{seller.seller_id_coverage_pct as %}})** — the remaining products returned no identifiable seller. All seller-level metrics below (CR3, HHI, multi-brand analysis) are computed only on the covered subset and will **undercount concentration** if the unknown sellers are the same entity. Treat as directional only.
  - If seller_id_coverage_pct < 0.20: additionally write '**Seller-level HHI and CR3 are unreliable at this coverage level and should not be cited as evidence of market structure.**'
  - If seller_id_coverage_pct >= 0.50: no disclaimer needed — render normally.
  - NEVER omit this disclaimer when coverage is below 50%. NEVER present seller HHI or CR3 as reliable figures when coverage is below 20%.
  CONCENTRATION ALERT rule (apply in Strategic Insights section):
  - If brand.cr3_sales > 0.60 OR brand.cr3_position > 0.45: flag 'Brand Duopoly Risk — top 3 brands control >X% of [positions/sales]; new entrants face a lock-in market.' Cite CR3 and HHI.
  - If seller.n_multi_brand_sellers > 0 AND their combined position_share > 0.30: flag 'Hidden Seller Concentration — N sellers each own multiple brands, together holding X% of BSR positions. The true competitive power is more concentrated than brand-level CR3 indicates.'
  - HHI interpretation: < 0.10 = fragmented, 0.10–0.18 = moderate, > 0.18 = concentrated (DOJ threshold).
  DATA QUALITY CAVEAT: if n_brands contains 'Unknown' as a significant brand, note '(brand coverage may be incomplete — Unknown entries are products whose brand could not be resolved)'. Apply the mandatory caveat rule from DATA QUALITY if brand coverage < 50%.

  ### PRICE DISTRIBUTION
  {price_distribution}
  Render this JSON under the heading '## Price Distribution' immediately after the Top 10 BSR Products section. Always include:
    1. A one-row percentile summary table: Min | P10 | P25 | Median | Mean | P75 | P90 | Max
    2. A bucket frequency table: Price Range | # Products | Share
  COVERAGE RULE: if 'n' < 'total_bsr', you MUST add a footnote line immediately below the bucket table: '† Price coverage: {n}/{total_bsr} BSR products had a valid price; # Products and Share are out of priced products only.'
  Never cite a bucket Share% as a fraction of total BSR products when coverage is partial.
  BIMODAL RULE: if 'is_bimodal' is true, the overall median is NOT representative — it falls in the gap between two clusters. You MUST:
    a) Add a '⚠️ Bimodal distribution detected' alert above the tables, citing the valley range from 'valley_range'.
    b) Render the 'tiers' array as a third table: Tier | Price Range | # Products | Share | Tier Median
    c) State which tier the recommended_capital targets (it is always based on the overall median, which may be misleading — flag this explicitly).
    d) In the Strategic Insights section, analyse each tier separately: barrier, competitive intensity, and positioning advice differ by tier.
  If 'is_bimodal' is false, add one sentence on whether the distribution is skewed low, skewed high, or balanced, and the pricing implication.

  ### COMPLIANCE & REGULATORY RISK
  {compliance_risks}
  This JSON is the output of a heuristic scanner that matched product titles and keywords against a regulatory database. Render it under the heading '## ⚠️ Compliance & Regulatory Risk' immediately after the Price Distribution section.
  RENDERING RULES:
  - If overall_risk == 'NONE': write a single line: 'No regulated-substance signals detected in BSR titles or keywords.' and skip the rest of this section.
  - Otherwise, open with a risk badge: 🔴 CRITICAL / 🟠 HIGH / 🟡 MEDIUM based on overall_risk.
  - For each entry in 'detected', render ONE paragraph covering: (a) which regulation applies, (b) what this means for FBA/logistics, (c) what a new entrant must do before listing. Cite the regulation name exactly as given — do NOT paraphrase regulation names.
  - If fba_hazmat is true, add a callout box: '⚠️ FBA HAZMAT: One or more product types in this niche require Amazon Dangerous Goods approval. Budget for SDS preparation, hazmat review (1–4 weeks), and possible seller-fulfilled fallback.'
  - Close the section with: '**Recommendation**: Before entering this niche, consult a regulatory attorney or Amazon-specialist compliance consultant. Listing without the required registrations or permits risks immediate ASIN suppression, account suspension, and civil liability.'
  - STRICT: do NOT add regulations not present in the JSON. Do NOT say a product IS compliant or IS non-compliant — only state what registrations ARE REQUIRED.

  ### DATA: {analysis_result}

  ### OPPORTUNITY SIGNALS
  {opportunity_signals}
  These are computed facts from this niche's data. Use them as MANDATORY anchors in the '# Actionable Prioritization' section. Rules:
  - 'review_floor_top20': the actual minimum reviews held by any BSR top-20 product. Use this as the specific target: 'You need X reviews to reach BSR #N, not X,000+.' NEVER write a generic review barrier without citing this number.
  - 'price_gap_band' + 'price_gap_count': if present, name this specific band as the underserved price point. Write: 'Only N products occupy the $X–$Y range — this is the whitespace entry point.'
  - 'least_crowded_sub_niche': if present, name this sub-niche explicitly as the recommended entry angle. Write: 'The [name] sub-segment has only N products in the top-50 — lowest competition density in this BSR.' Do NOT recommend sub-niches that are not in this data.
  - 'weakest_rank_slot': if present, cite the specific rank, ASIN, and review count: 'BSR #[rank] is held with only [reviews] reviews — a directly achievable displacement target.'
  - 'compliance_accessible_angle': if present, include this as a P0 item. A new entrant avoiding FIFRA registration is a structural cost advantage, not a nice-to-have.
  - 'recent_breakthrough_examples': if present, name 1–2 product titles as proof that new entrants CAN break into this BSR within the last 12 months.
  FORBIDDEN in the Actionable section: 'superior efficacy', 'compelling brand story', 'clear value proposition', 'eco-friendly formulation' (unless eco-friendly is in opportunity_signals), 'unique application method' — these are filler. Every P0/P1 item MUST contain at least one specific number or named sub-niche from the data above.

  ### CRITICAL REVIEWS ANALYSIS (Recent ≤90 days, stratified sample)
  {critical_reviews_data}
  This JSON contains recent critical reviews (1–3 stars, ≤90 days old) collected via stratified sampling across three market segments. Each entry carries a 'stratum' field:
    • 'leaders'     — BSR rank 1–10 products (up to 2 brands): what even the best incumbents get wrong
    • 'mid_tier'    — BSR rank 11–30 (up to 2 brands, excluding leaders): challenger-segment weaknesses
    • 'new_entrant' — products listed within the last 12 months that reached BSR (up to 1 brand): what recent entrants are still failing to fix
  Sampling across strata prevents top-brand complaints from dominating; cross-stratum themes carry the highest signal value.
  RENDER under the heading '## Market Entry via Deficiency Fix (Recent Critical Reviews)' immediately after the Compliance & Regulatory Risk section.
  ANALYSIS STEPS (apply in order):
  1. For each ASIN, extract recurring complaint themes from 'title' and 'content'. Merge near-duplicates (e.g. 'broke after two weeks' + 'cheap plastic' → 'Build Quality'). Count how many reviews per theme per ASIN.
  2. Sort themes by total helpful_votes across all ASINs (buyer-impact proxy). Prefer verified-purchase (is_verified=true) reviews as primary evidence.
  3. Classify each theme:
     - FIXABLE: QC failures, unclear instructions, packaging defects, missing accessories, size/calibration errors, features that better sourcing could provide. These are entry opportunities.
     - STRUCTURAL: Trade-offs intrinsic to the product type, regulatory constraints, or price-floor issues no entrant can solve without a fundamentally different product.
  4. Scope classification — CRITICAL for interpretation:
     - CATEGORY-WIDE PAIN POINT: theme appears in ≥2 ASINs from different strata (strongest entry signal — even market leaders and challengers share this flaw).
     - CROSS-STRATUM (same tier): theme appears in ≥2 ASINs within one stratum only.
     - BRAND-SPECIFIC WEAKNESS: theme appears in only one brand's ASIN (competitor's unique flaw, not a category opportunity).
  5. Render a compact markdown table: Complaint Theme | # Reviews | Helpful Votes | Type (Fixable/Structural) | Scope | Strata Affected
  6. Close with a one-line verdict: 'New-entrant fix-it viability: HIGH / MEDIUM / LOW — [1-2 sentence rationale citing the top fixable, category-wide complaint and which strata it spans]'
  GUARD RULES:
  - If critical_reviews_data is '{{}}' or all ASINs returned 0 recent reviews, write: 'No recent critical reviews (≤90 days) collected — product quality cannot be assessed from this data.' and skip the table.
  - All reviews in this dataset have already been pre-filtered in Python: logistics/shipping complaints and "works as designed" disclaimers are removed before reaching this prompt. Do NOT re-introduce those categories as structural complaints — they are absent by design, not by omission.
  - NEVER cite a complaint absent from the provided review text. Do not generalise beyond what reviewers wrote.
  - A single 1-star rant is not a structural flaw. Require ≥3 corroborating reviews to label a theme STRUCTURAL.
  - If helpful_votes = 0 for all reviews, sort by rating (lowest first) as severity proxy.
  - NEVER conflate stratum rank with complaint severity — a mid-tier flaw that spans all three strata outranks a leaders-only flaw.

