  - PORTER'S FIVE FORCES — DIRECTION RULE (CRITICAL): In Porter's Five Forces, the 'Threat' rating refers to how easy it is for a new player or substitute to enter and succeed — NOT how hard the barriers are. The direction is always the INVERSE of barrier height. MANDATORY mappings from this report's data:
    • Threat of New Entrants: LOW when new_entrant_ratio < 15% OR avg_reviews_top10 > 5,000 OR review_disparity > 5x — high barriers mean low threat. HIGH only when new_entrant_ratio > 40% AND review barrier is low.
    • Bargaining Power of Buyers: HIGH when deal_intensity > 7 OR price compression is severe (many sellers forced to discount). LOW when buyers have few alternatives.
    • Threat of Substitutes: HIGH when related keywords dominate search volume; LOW when the product category is specific and has no close alternatives.
    • Rivalry: HIGH when CR3 < 30% (fragmented competition, many rivals) OR churn is high. LOW when a few brands dominate and competition is stable.
    • Supplier Power: LOW for commodity inputs (most physical goods); HIGH only when key raw materials are scarce or proprietary.
  FORBIDDEN: do NOT write 'Threat of New Entrants: High' and then explain high review barriers or low new_entrant_ratio — those data points map to LOW threat. If you catch yourself writing this, flip the label to match the evidence.
