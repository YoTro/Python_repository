    FORMAT for the Risk & Opportunity Assessment paragraph: open with the 2-axis label in bold (e.g. **PRICE ELASTICITY TRAP**), state the YOY figures, name the root cause hypothesis in one sentence, then give the actionable conclusion (enter / enter with caution / avoid). Never use the label alone without the supporting data.
  - NEW ENTRANT ALERT: If new_entrant_ratio > 40%, the category has low moat — many new products are breaking into the top-100, which means low ranking stickiness but also means a new entrant has a realistic shot. If < 15%, incumbents dominate and new entries rarely survive in the ranking.
  - INTEGRITY ALERT: If integrity_alert is 'HIGH', explicitly warn that this category has a severely compromised compliance environment — widespread fake review injection or coordinated negative review attacks are likely. New entrants should budget for additional compliance overhead, and the true review barrier is likely higher than the raw data suggests. Combine with review_disparity to assess whether high-review incumbents are defensible or artificially inflated.
  - INTEGRITY SWOT PLACEMENT (apply whenever integrity_alert is not 'LOW'):
    • T1 (Threat — Review Attacks) — ALWAYS include when integrity_alert is MEDIUM or HIGH: 'Coordinated negative-review attacks are an asymmetric threat to a new listing with no review buffer. A HIGH integrity environment means a competitor can sink your launch-phase ASIN before organic velocity builds. Budget for early review monitoring and appeal reserves.' Cite integrity_alert level and integrity_hist_cov / integrity_ratio_cov coverage figures.
    • T2 (Threat — Rating Inflation Trap) — apply when integrity_alert is 'MEDIUM' or 'HIGH' AND the category has inherent product-effectiveness variability. A category has inherent variability when performance is co-determined by factors the product cannot control: environmental conditions (humidity, temperature, infestation density), user behaviour (placement, dosage, frequency), or individual physiology (supplements, skincare). In such categories, genuine organic ratings cluster in the 3.7–4.2 range because a meaningful fraction of buyers experience below-expectation results through no fault of the product. When most competitors have inflated to 4.3+ via brushing (evidenced by high review_ratio and integrity_alert), an honest new entrant's authentic rating falls below the manipulated industry baseline. Amazon's ranking algorithm and search-result CTR both weight star rating directly — a genuine 3.9 is algorithmically treated as inferior to a manipulated 4.5 regardless of product quality. State this explicitly: 'The industry rating baseline in this category is artificially elevated by widespread review manipulation. A genuinely-rated product in a variable-effectiveness niche would naturally score 3.7–4.2; incumbents showing 4.4+ are almost certainly brushed. An honest new entrant will sit below this manipulated floor and face a structural conversion handicap that PPC spend cannot fully compensate. Factor this into launch expectations and review acquisition strategy.' GUARD: do NOT apply T2 to categories where uniform high ratings are plausibly genuine — commoditised products with deterministic, user-independent outcomes (cables, batteries, storage containers, measuring tools). Apply only when you can identify at least one concrete effectiveness variable that the product cannot control.
    • O (Opportunity) — include when review_disparity > 3x OR integrity_alert is 'HIGH': 'Incumbent review counts may be artificially inflated (integrity_alert={integrity_alert}, review_disparity={review_disparity}). A genuine-quality entrant building authentic reviews at a lower absolute count can achieve equivalent conversion — the real review floor is lower than raw numbers suggest.' NEVER write this Opportunity without citing the specific review_disparity figure and the integrity signal that supports it.
    • If integrity_alert is 'LOW', omit all bullets from SWOT entirely — do not manufacture a risk that the data does not support.
  - NEW ENTRANT SOCIAL ALERT: Examine brand_social_data for entries where is_new_entrant is true. The 'psi' field is the maximum across all platforms; check 'platforms' for per-platform detail.
