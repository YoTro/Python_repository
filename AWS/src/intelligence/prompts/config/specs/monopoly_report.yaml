    • If a brand has BOTH is_top_brand AND is_new_entrant true: call this a 'breakout pattern' — a brand that entered within the last 12 months and is simultaneously dominant in BSR rank AND social. This is the highest-conviction signal that a video-first launch strategy works here; cite the brand name, PSI, and which platform(s) are strongest.
    • If all new-entrant brands have psi ≤ 30 (or brand_social_data has no new-entrant entries): note that new entrants are not yet promoting on social at scale — the category still relies primarily on internal PPC. An external-promotion-first entrant may have a first-mover advantage.
