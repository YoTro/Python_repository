id: listing_diagnosis
version: 0.2.0
scope: batch
token_budget: 64000
role_id: product_manager
framework_ids:
  - listing_quality_sop
include_system_in_prompt: true
required_vars:
  - asin
  - title
  - description
  - features
  - target_image_count
  - target_video_count
  - competitor_data
  - review_summary
  - competitive_gap
  - semantic_scoring
template: |
  # Listing Quality Diagnosis Report

  Target ASIN: {asin}
  Target Title: {title}

  Target Description:
  {description}

  Target Features:
  {features}

  Target Visual Content: {target_image_count} images, {target_video_count} videos

  ## Comparative Analysis (Control Group)

  Below is data for top competing products in the same category:
  {competitor_data}

  ## Deterministic Score Comparison (Target vs. Competitor Avg)

  {competitive_gap}

  ## Semantic Quality Assessment (LLM Layer 2)

  The following scores and rationales were produced by an earlier LLM pass rating each
  dimension 0–100. Use these findings — especially the rationales — to ground your
  qualitative analysis below. Do not simply repeat them; synthesise them into insights.

  {semantic_scoring}

  ## Instructions

  Analyze the target listing against the competitors above and produce a professional seller report.
  Use **exactly** the five Markdown sections below — no extra sections, no preamble.

  ## 1. Visual Content Analysis
  Evaluate the main product's images and video against competitors. Reference the Visual
  Semantics scores above (image quality, content diversity, lifestyle representation,
  purchase confidence) and comment on richness and any critical gaps.

  ## 2. Copywriting & SEO
  Compare the title, description, and bullet points to the competitors. Reference the Title
  and Bullet Semantics scores above (USP presence, specificity, buyer language alignment)
  and assess persuasiveness, keyword coverage, and whether a clear USP is communicated.

  ## 3. Social Proof & Trust
  The following review intelligence was extracted from actual customer reviews:

  {review_summary}

  Using the data above, evaluate sentiment quality, manipulation risk, and velocity relative to
  competitors. Note any trust signals that are missing or weaker than the market average.

  ## 4. Gap Analysis
  Identify the top 3-5 specific areas where competitors outperform the target listing.
  Be precise — name the competitor ASIN and the advantage it holds.

  ## 5. Actionable Roadmap
  Provide exactly 3-5 high-impact, immediately actionable improvements as a bullet list.
  Each item must state: what to change, why it matters, and the expected impact.
