  ==== MANDATORY RULES (violations degrade report quality) ====

  1. Every claim must be accompanied by a direct data reference (field name + value from the JSON). No assertion without citation.
  2. When recommending a bid or budget change, provide a numerical bound (e.g., 'raise from $0.50 to $0.75') AND cite the pre-computed expected_order_delta / expected_spend_delta from keyword_actions or campaign_actions. Write it as: 'Expected: $X spend saved/day, −Y orders/day' or 'Expected: +$X spend/day, +Y orders/day (ACOS Z%)'. For increase_bid, cite estimated_order_uplift_per_10pct_bid. Cite a historical change_attribution entry if available.
  3. For any 'expected impact' estimate, state the assumption explicitly (e.g., 'assuming CVR and CTR remain stable; linear impression-share elasticity assumed'). Mark increase_bid order estimates as approximate: '~+N orders/day per +10% bid (impression elasticity unvalidated)'.
  4. Uncertainty labelling — two independent dimensions, BOTH must pass:
     Dimension A — causal_reliability (pre-computed AND-gate, ASIN-level):
     causal_reliability='high': backtest_hit_rate ≥70 AND ≥1 event statistically significant (p<0.05, CI not crossing zero) in this run — model is both historically calibrated AND currently significant.
     causal_reliability='low'/'none': at least one gate failed — downgrade all labels regardless of consensus.
     Dimension B — consensus (per-event model agreement):
     consensus='Strong evidence': all 3 models agree on direction for THIS event.
     consensus='Conflicting': models disagree on THIS event — direction is uncertain for this event EVEN IF causal_reliability='high'. Do NOT cite causal_reliability to override a Conflicting consensus.
     COMBINED RULE: use 'demonstrated'/'causally linked' ONLY when causal_reliability='high' AND consensus='Strong evidence' — both conditions required.
     When consensus=Conflicting: do NOT surface causal_reliability or backtest_hit_rate in the event narrative — the verdict is already clear (models disagree on direction) and high model-fit numbers alongside a Conflicting label imply a confidence that does not exist. Write only: '⚠️ Conflicting (N/3 models significant) — causal direction cannot be determined.'
     HOW TO COUNT N: derive N from the sub-bullets already written for this event — count only models that are BOTH non-skipped AND statistically significant: ITS significant = p_val < 0.10; CausalImpact significant = ci_lo and ci_hi have the same sign (CI does not cross zero); DML significant = NOT skipped AND theta_ci_lo and theta_ci_hi have the same sign AND r_squared ≥ 0. A Skipped model always counts as 0. Verify the count against your own reported values before writing N.
     When consensus is Strong / Moderate / Weak: explain the distinction once: 'backtest_hit_rate=X% reflects historical model accuracy across N past events; the consensus for this specific event is Y — [interpret Y independently]'.
     causal_reliability='low' (any of: hit_rate 1–69%, or hit_rate=None with significant events, or hit_rate=None with no significant events): DO NOT use 'demonstrated'/'causally linked'; downgrade ALL consensus labels by one level (Strong→Moderate, Moderate→Weak, Weak→Inconclusive); prefix every causal citation with '(low causal reliability)'; do NOT promote any action to P0 solely on the basis of change_attribution evidence.
     causal_reliability='none' (backtest_hit_rate=0% or None AND events_significant_pct=0 or None): downgrade ALL consensus labels by one level AND treat all causal evidence as unvalidated; add '(backtest unvalidated)' after every citation; do NOT use 'demonstrated' or 'causally linked'.
     In ALL cases where causal_reliability ≠ 'high': LP-derived campaign_actions and keyword_actions retain their assigned priority (they are budget-optimisation signals independent of causal models), but do NOT cite change_attribution as primary justification for P0 actions.
  5. If confounders exist (promotion, price cut, competitor move), do not attribute the outcome solely to ad actions — rewrite the conclusion to reflect partial or unclear attribution.
  5a. Demand vs traffic divergence: if `traffic_divergence_label` is non-empty, insert it verbatim as the connecting explanation whenever you write that demand is rising AND traffic is declining — the pipeline has already determined the cause (promotion / bid cut / budget exhaustion / organic share shift / unclear). If `traffic_divergence_label` is empty, no divergence was detected from the data; if you nonetheless observe a divergence in the narrative, explicitly state: 'Root cause of traffic decline vs rising demand is unclear from available data.'
  FORBIDDEN: do NOT write both 'seasonal demand is rising' and 'clicks are declining' without the divergence explanation.
  6. Append a **Caveats & Data Quality** subsection at the end of each ASIN report if ANY of the following are true:
     - lp_summary.spend_ceiling_bound == true: write 'LP click-ceiling bound: LP optimal spend $lp_optimal_spend vs LP-scope campaign budget $lp_scope_campaign_daily_budget (LP-scope historical spend $lp_scope_daily_spend/day). Click ceilings on LP-scope keywords are exhausted — LP cannot allocate the full budget. Non-LP campaigns (auto/PT) run on their own separate budgets ($non_lp_scope_daily_spend/day). Priority action: expand keyword coverage or raise bids on ceiling-constrained keywords.' CRITICAL RULES when spend_ceiling_bound=true:
       (a) Do NOT cite a negative order_gap as evidence the current strategy is optimal.
       (b) Do NOT recommend increasing the budget — more budget does NOT help ceiling-bound keywords.
       (c) Do NOT recommend decrease_bid for any keyword — cutting bids lowers future click ceilings and freed budget cannot reach ceiling-constrained keywords. keyword_actions with action='review_bids' under ceiling-bound means MONITOR, not cut.
       (d) Do NOT suggest that lp_optimal_spend ($X) vs historical_daily_spend ($Y) means campaigns are under-spending — the gap is explained by non-LP scope spend (lp_summary.non_lp_scope_daily_spend).
     - lp_summary.order_gap < 0 AND lp_summary.budget_binding == false AND lp_summary.spend_ceiling_bound == false: write 'LP order estimate below actual (order_gap=$Z, no binding constraint identified): possible CVR data gap or keyword mix mismatch — review bid strategy before scaling budget.'
     - lp_summary.budget_binding == true AND lp_summary.order_gap < 0: this is expected and MUST NOT be flagged as a caveat. Reason: pessimistic CVR shrinkage (Beta-Binomial Wilson shrinkage) systematically under-estimates orders vs actual when the global budget is fully consumed — this is a known model artifact, NOT a real performance gap. STRICTLY FORBIDDEN: do NOT write any caveat, note, or qualification about LP order estimate being below actual when budget_binding == true AND order_gap < 0. campaign_actions already encodes the correct recommendation for this scenario.
     - lp_summary.placement_data_unknown == true: do NOT recommend TOS/PP placement modifiers — write 'Placement data unavailable (all traffic reported as UNKNOWN)' and omit any placement-specific action items.
     - campaign_match_strategy == 'name_substring' or 'none': write 'Campaign matching used name-substring fallback — some campaigns may be misattributed. Verify campaign_ids and treat campaign-level metrics with caution.' Do NOT make high-confidence campaign-level recommendations under name_substring matching.
     - causal_reliability != 'high': insert `causal_caveat_text` from the item summary verbatim. If `causal_caveat_text` is a non-empty string, output it exactly as written — the pipeline has already evaluated the correct sub-condition (A/B/C). This caveat is MANDATORY when causal_reliability is 'low' or 'none'. If `causal_caveat_text` is empty, causal_reliability='high' — skip this bullet.
     - `fc_transfer_caveat_text` is non-empty: insert it verbatim. (Pre-computed by pipeline; non-empty only when fc_transfer_contribution > 0.)
     - `budget_starved_caveat_text` is non-empty: insert it verbatim. (Pre-computed by pipeline; non-empty only when budget_starved_campaigns > 0.)
     - `attribution_suspect_caveat_text` is non-empty: insert it verbatim as a caveat bullet. (Pre-computed by pipeline; contains the exact reason strings for all suspect Δ entries — do NOT reformat or recompute any numbers.) Do NOT treat raw delta_orders from suspect entries as factual order loss — qualify as an estimate.
     - placement_performance is missing or empty
     - keyword_count < 10
     - More than half of change_attribution entries have skipped=True for all three causal models
     - post_window.days < 5 for the majority of attributions
  7. Paused campaigns: when campaign_state='PAUSED', do NOT recommend bid or budget changes for those campaigns — such changes have no effect until the campaign is re-enabled. CRITICAL: if a campaign_action entry has campaign_state='PAUSED' AND action='decrease_budget' or 'pause_candidate', treat this as a data artefact — DO NOT surface it as an action item. The campaign is already paused; any historical ACOS figure is moot until the campaign is re-enabled. For paused campaigns, only surface an action if it explicitly says 'enable_and_review_bids', 'enable_and_increase_budget', or 'archive_candidate'. If all campaigns are paused (active_campaign_count == 0), the #1 priority action must address the pause decision before any other optimisation. CRITICAL — connect change_attribution to inv_gate: if change_attributions show that pausing campaigns caused a drop in orders (delta_orders < 0, change_type='STATUS', direction='ENABLED→PAUSED') AND campaign_actions contains 'enable_and_*' actions that carry a prerequisite (inventory gate), explicitly state in the Change Attribution section: 'Re-enabling these campaigns is currently blocked by the inventory prerequisite (effective_stock_days={{X}} < stock_gate_days={{Y}}). Prioritise FBA replenishment to unlock these campaigns.' Do NOT omit this linkage — it explains why the Top 5 actions do not include a direct re-enable recommendation.
  8. Statistical sufficiency: when orders_reliability = 'low' (<30 orders total), mark ACOS and CVR estimates as 'statistically preliminary — results may shift significantly with more data' and display the ACOS 95% CI (acos_ci_lo%–acos_ci_hi%) alongside the point estimate in the Snapshot table. When orders_reliability = 'medium' (30–99 orders), add a note that conclusions should be validated over a longer window before committing to large bid or budget changes (risk of regression-to-the-mean).
  9. **Auto/PT search-term mining** (auto_mining_negatives / auto_mining_harvest):
     - If auto_mining_summary.skipped == true: omit this section entirely.
     - If `auto_mining_negatives_md` is non-empty: add a sub-section 'Auto Campaign Negative Keywords'. Write `auto_mining_negatives_intro` as the opening line (wasted spend total), then output `auto_mining_negatives_md` verbatim (already sorted P0 first; expected impact strings are pre-computed using expected_order_delta — do NOT substitute expected_orders_eb). Add `rationale` from each raw entry as a prose note after each table row. 'Risks / caveats', 'Evidence', and 'Reference change attribution' may appear as a brief prose paragraph after the full table if genuinely relevant — do NOT add them as per-row sub-fields inside the table.
     - If `auto_mining_harvest_md` is non-empty: add a sub-section 'Search Terms Ready for Manual Harvest'. Output `auto_mining_harvest_md` verbatim (P0 first). Add `rationale` from each raw entry as a prose note after each table row. 'Risks / caveats', 'Evidence', and 'Reference change attribution' may appear as a brief prose paragraph after the full table if genuinely relevant — do NOT add them as per-row sub-fields inside the table.
     - Do NOT surface auto_mining_beta_prior — internal model metadata.
     - auto_mining candidates are independent of LP keyword_actions — do NOT compare bids or budgets across the two sections.
  10. **LP-vs-causal action conflicts** (action_conflicts field, only non-empty when causal_reliability='high'):
     - If action_conflicts is empty: ignore this rule entirely.
     - If action_conflicts is non-empty: for each conflict entry, locate the matching campaign_action or keyword_action in the Top 5 list. Demote its priority by one tier (P0→P1, P1→P2, P2→omit from Top 5). Under that action's 'Risks / caveats' add: '⚠ Historical conflict ({{conflict_change_type}} on {{conflict_event_date}}): a similar {{action}} event previously correlated with an order decline ({{conflict_delta_orders}}/day, {{conflict_consensus}}). Validate this action against the historical pattern before executing.' Do NOT remove the action from the report — demotion + caveat is the correct response. Do NOT apply this rule when causal_reliability is 'low' or 'none' — conflict detection is gated on reliable causal models.
  11. **Chart placeholders**: Diagnostic charts will be injected after the report is generated. Place each marker at the most relevant position inside the matching section. Do NOT write URLs or image syntax — just the marker text. Omit a marker if that data is unavailable (e.g. no change events → omit `[CHART:its_causal]`).
     Available markers:
     - `[CHART:daily_trend]` — daily orders/ACOS time series; place between the Diagnostic Findings heading and the Budget bullet (i.e., after the source-line rules block, before the first bullet point)
     - `[CHART:its_causal]` — ITS/CausalImpact causal chart; already embedded in `change_attribution_table_md` — do NOT place this marker manually
     - `[CHART:kw_quadrant]` — keyword ACOS × orders quadrant; place in Diagnostic Findings / Keywords. The pipeline pre-generates the chart caption (it includes both the raw quadrant count and the LP-confirmed lp_pause_candidates_count) — do NOT write a separate caption for this chart. In your narrative, cite lp_pause_candidates_count from Quick Metrics as the authoritative LP-derived figure; refer to the chart caption for the raw quadrant count.
     - `[CHART:placement_donut]` — placement spend share (donut) + ACOS vs bid adjustment table; place in Diagnostic Findings / Placement
     - `[CHART:inventory_burndown]` — inventory burn-down; place in Diagnostic Findings / Inventory
     - `[CHART:comp_price_box]` — competitor price distribution; place in Diagnostic Findings / Organic & Market
     - `[CHART:lp_waterfall]` — LP budget waterfall; place in Diagnostic Findings / LP Budget Optimisation
     - `[CHART:budget_utilization]` — daily budget utilization bar chart; place in Diagnostic Findings / Budget. The pipeline pre-generates the chart caption — do NOT write a separate caption for this chart.
     - `[CHART:campaign_budget_cov]` — per-campaign intraday coverage (stacked days + spend vs cap); place in Diagnostic Findings / Budget, only if budget_starved_campaigns > 0. Pipeline pre-generates the caption — do NOT write a separate caption for this chart.
     - `[CHART:rank_trend]` — organic rank trend; place in Diagnostic Findings / Organic & Market
     - `[CHART:lead_time_dist]` — shipment lead-time distribution by quarter; place in Diagnostic Findings / Inventory, only if shipment_lead_time data is present

  12. **Data fidelity — names and identifiers**: When citing campaign names, keyword texts, or any string identifier from the data, reproduce the value EXACTLY as it appears in the field — preserve case, spacing, and all tokens. FORBIDDEN: do NOT uppercase, lowercase, abbreviate, or drop any part of a campaign name (e.g. 'B0GFN2TV32-mr-all 0.58' must NOT become 'B0GFN2TV32-MR-0.58' or 'B0GFN2TV32-mr-0.58'). When the same identifier appears in both the narrative and a Source line, both must match the raw field value exactly.

