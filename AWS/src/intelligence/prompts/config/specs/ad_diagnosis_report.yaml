id: ad_diagnosis_report
version: "1.0.0"
scope: batch
token_budget: 180000
role_id: senior_ads_analyst
framework_ids: []

required_vars:
  - count
  - report_date
  - _summary_json
  - _snapshot_table
  - items_json

optional_vars: {}

output_schema: null

template: |
  You are a senior Amazon advertising analyst. Analyse the following enriched advertising dataset for {count} ASIN(s) and produce a structured diagnostic report strictly following the output format below.

  Report date: {report_date}  (use this to interpret relative dates — e.g., a change_attribution event on 2026-04-17 is 10 days ago; the last entry in natural_rank_series is today's rank.)

  Pre-computed highlights (authoritative — do not re-derive these values):
  {_summary_json}

  Full enriched data (use for keyword-level, attribution, rank-series, trend, and competitor analysis):
  {items_json}

  ==== OUTPUT FORMAT (repeat for each ASIN) ====

  ## ASIN: {{asin}} – Severity: 🟢 Healthy / 🟡 Warning / 🔴 Critical

  ### Quick Metrics Snapshot

  The table below is pre-computed by the pipeline — field values and Source / How derived strings are deterministic and fixed. Do NOT re-derive any value, do NOT modify any source string. Fields excluded from the table (they are dicts/lists rendered in dedicated sections below): lp_summary, lp_top_allocations, lp_reallocation_table, campaign_actions, keyword_actions, auto_mining_summary, auto_mining_beta_prior, auto_mining_negatives, auto_mining_harvest.

  {_snapshot_table}

  **Field interpretation guide** (apply when writing Diagnostic Findings and other sections — these rules explain what each field means, not how to fill the table above):
    title / brand / size / bullet_point_count → SP-API Catalog
    lookback_days → days config (default 30); period covered: data_start_date → data_end_date
    data_start_date / data_end_date → reporting window used for all time-series fields (today − lookback_days → yesterday; use these when describing 'past N days')
    total_available → fulfillable FBA units (point-in-time)
    inbound_receiving / inbound_shipped / inbound_working → FBA inbound tiers: receiving=at FC being checked in (1-2d, certain); shipped=in transit from seller (10-30d depending on sea/domestic); working=shipment plan created, not yet shipped (uncertain ETA — do NOT count as arriving soon)
    total_inbound = inbound_receiving + inbound_shipped (confirmed in-transit only)
    effective_stock_days (in campaign_actions/keyword_actions prerequisite) = (total_available + inbound_receiving + catchable_shipped) / daily_sales; catchable_shipped = inbound_shipped only when inbound_lead_days < can_sell_days
    prerequisite field on actions → inventory gate triggered: action downgraded to P2 because effective_stock_days < stock_gate_days (default 21). When reporting these actions, state the prerequisite condition clearly and recommend the seller confirm inbound ETA before activating.
    daily_sales / daily_sales_source → daily_sales = total units sold ÷ lookback_days (ALL channels: ad-attributed + organic). Source priority: (1) caller-supplied, (2) order_metrics = SP-API getOrderMetrics (ad + organic, most accurate), (3) ad_orders_only = spCampaigns ad-attributed orders ÷ days only — organic orders excluded, so daily_sales is a LOWER BOUND on true consumption velocity. When reporting inventory runway, always state the source. When daily_sales_source=ad_orders_only, warn that true stockout will occur SOONER than can_sell_days indicates (organic sales consume inventory too).
    can_sell_days → total_available ÷ daily_sales (null if daily_sales unavailable; when daily_sales_source=ad_orders_only: this is an UPPER BOUND — actual stockout is sooner because organic orders are excluded from the denominator; can_sell_days_note field contains a human-readable caveat)
    inventory_risk → can_sell_days < inventory_risk_days config (default 30 d)
    shipment_lead_time → store-wide FBA shipment lead-time distribution. data_source field indicates measurement quality: 'lingxing_erp' = precise stage-level dates (SHIPPED/RECEIVING/CLOSED); 'sp_api_plans' = proxy (plan_creation → fba_receive for CN-source SHIPPED plans — sea_transit.p75 overestimates true sea transit by roughly the plan-creation-to-departure lag, typically 7–21d; treat as conservative upper bound); 'none' = no data, inbound_lead_days falls back to config default. Three phases (lingxing_erp only): (1) sea_transit_overall = SHIPPED→RECEIVING transit >12d; (2) local_to_fba_overall = SHIPPED→RECEIVING ≤12d (domestic 3PL→FBA); (3) fba_processing_overall = RECEIVING→CLOSED. Structure: {{sea_transit_overall: {{n, p25, median, p75, p90}}, local_to_fba_overall: {{n, p25, median, p75, p90}}, fba_processing_overall: {{n, p25, median, p75, p90}}, by_quarter: {{"YYYY-Qn": {{sea_median, sea_p75, ...}}}}, data_source: str}}. PLANNING RULE: total lead time = sea_transit_p75 + local_to_fba_p75 + fba_processing_p75. When data_source='sp_api_plans': use sea_transit_p75 as a single-phase total-lead-time proxy and note '(SP-API proxy estimate; may overestimate by ~2 weeks)'. If can_sell_days ≤ total lead time, a replenishment order must ship NOW. inbound_lead_days is set to sea_transit_p75 when available (from either source).
    campaign_count → count of campaigns matched to this ASIN (matching method in campaign_match_strategy)
    campaign_match_strategy → how campaigns were matched to this ASIN: explicit_config (most reliable) | spAdvertisedProduct (ground truth — campaigns that actually delivered ads for this ASIN per report data) | name_substring (fragile — ASIN in campaign name; may include unrelated campaigns) | none
    active_campaign_count → campaigns with state=ENABLED
    paused_campaign_count → campaigns with state=PAUSED
    total_daily_budget → sum of ENABLED campaign daily budgets (Ads API, current config)
    bidding_strategies → distinct strategies across matched campaigns
    total_spend / total_sales / total_orders / total_clicks → spCampaigns ad-attributed performance (ad orders only, organic excluded), summed over matched campaigns, period: data_start_date → data_end_date. NOTE: total_orders here is AD-ATTRIBUTED orders only. True total unit sales (ad + organic) = daily_sales × lookback_days when daily_sales_source=order_metrics.
    account_acos → total_spend ÷ total_sales × 100 (data_start_date → data_end_date)
    budget_exhaustion_pct → DEPRECATED legacy aggregate (total_spend ÷ (snapshot_budget × days)). Misleading when budget changed mid-period; do NOT use as primary signal — prefer the day-level metrics below.
    budget_likely_exhausted → DEPRECATED legacy boolean derived from budget_exhaustion_pct > 90%. Use budget_pressure instead.
    budget_active_days → days with non-zero spend in the lookback window (denominator for all day-level budget metrics)
    budget_exhausted_days → number of active days where daily spend ≥ 85% of campaign daily budget cap (85% threshold accounts for Amazon's ≤25% daily overspend pacing allowance — a day at 85% of cap is effectively cap-constrained)
    budget_exhausted_days_pct → budget_exhausted_days ÷ budget_active_days × 100 — primary budget pressure signal
    avg_daily_utilization_pct → mean(daily_spend ÷ campaign_daily_budget) × 100 across active days (uses LP-reconciled budget, not raw snapshot)
    p90_daily_utilization_pct → 90th-percentile daily utilization. If ≥ 85%: budget caps delivery on peak days even when the average appears healthy. If > 100%: actual spend EXCEEDED the budget cap on that day — see over-delivery note below.
    max_daily_utilization_pct → peak single-day utilization across the window; useful for gauging worst-case over-delivery.
    overdelivery_days → count of active days where actual spend exceeded the daily budget cap (utilization > 100%).
    budget_source → how the daily_budget_cap denominator was determined: 'campaign_snapshot' = current Ads API budget (overage ≤ 25%); 'historical_avg_spend' = snapshot understated capacity, cap reconciled to historical_avg × 0.90 (overage > 25%).
    OVER-DELIVERY INTERPRETATION (p90 or max > 100%): Amazon standard delivery may overspend by up to 25% above the daily cap on high-traffic days, catching up for days with lower spend — this is expected behavior (p90 up to ~125%). If p90_daily_utilization_pct > 125% or max_daily_utilization_pct is substantially > 125%, the most likely cause is a mid-period budget REDUCTION: the budget was higher earlier in the window, spend from those higher-budget days inflates the utilization ratio against the lower current cap. In this case budget_source = 'historical_avg_spend' and you MUST note: 'p90 utilization of X% reflects that budget was reduced mid-period — historical spend under the old cap now appears to exceed the new reconciled cap; this does NOT mean Amazon violated the cap, it means the cap changed.' Do NOT interpret over-100% utilization as the budget blocking delivery — on those days the campaign spent freely above the cap.
    budget_pressure → categorical: 'chronic' = cap hit on ≥75% of active days (budget is a systemic constraint, primary blocker); 'moderate' = 30–74% of days (budget constrains delivery on most active days); 'light' = 10–29% of days (occasional constraint); 'none' = <10% of days (budget is not the binding constraint)
    budget_starved_campaigns → count of campaigns whose daily spend hit ≥85% of their cap on ≥30% of active days — these campaigns run out of budget mid-day and stop serving ads before midnight. Per-campaign detail is in campaign_budget_coverage (in _summary_json): [campaign_name, active_days, exhausted_days, exhausted_pct, all_day_pct, current_budget, avg_daily_spend]. all_day_pct = % of active days the budget lasted through the full day. INTERPRETATION RULES:
      - If exhausted_pct ≥ 75%: the campaign almost always runs dry mid-day — budget is a hard ceiling on delivery; the reported ACOS reflects only morning/early-day traffic (often higher CVR), which means measured ACOS may look deceptively healthy while afternoon/evening volume is zero.
      - If exhausted_pct 30–74%: budget constrains roughly half the campaign days; recommend raising daily budget by at least (avg_daily_spend − current_budget) × 1.20 to ensure all-day delivery.
      - If exhausted_pct < 30%: budget is not a binding constraint for this campaign; focus on bids and keyword quality instead.
      - BUDGET_AMOUNT change-history events are used to reconstruct historical caps so the exhausted_pct is not skewed by mid-period budget increases.
    keyword_count / avg_bid / min_bid / max_bid / match_type_dist → Ads API keyword list for matched campaigns (current config, not time-series)
    kw_performance_count → rows in spSearchTerm report with ≥ min_clicks_for_cvr clicks (data_start_date → data_end_date)
    lp_reallocation_table → list of up to 8 LP-scoped campaigns sorted by delta_orders descending (biggest order gainers first); fields: campaign_name, campaign_acos (spend÷sales×100 for this campaign, null if no sales), current_spend (historical daily avg $/day), lp_spend (LP-optimal $/day), delta_spend (lp − current, ≈ 0 net), current_orders (keyword-attributed orders/day), lp_orders (LP-estimated orders/day using raw un-deflated CVR — same basis as order_gap), delta_orders (lp_orders − current_orders; sum ≈ order_gap), cut_keywords (pre-computed list of {{keyword, acos_pct}} — above-target ACOS zero-click keywords in this campaign; budget source; already filtered acos_pct > target_acos_applied), receive_keywords (pre-computed list of {{keyword, acos_pct}} — maxed-out keywords in this campaign; budget destination; acos_pct confirms they are below target). Positive delta_orders = LP allocates more clicks → more orders; negative = LP cuts this campaign. Rendered in the standalone "Budget Redistribution" section immediately after LP Budget Optimisation, before Change Attribution.
    lp_zero_keywords_count / lp_maxed_keywords_count → scalar counts shown in Quick Metrics Snapshot for quick overview; the full keyword lists are rendered in the LP Budget Redistribution section (see below).
    lp_zero_keywords → list of dicts [{{keyword, campaign_id, campaign_name, acos_pct}}]; acos_pct is actual ACOS from search term report (null if insufficient clicks); compare against target_acos_applied from lp_summary to classify cause. Full rendering in Budget Redistribution section.
    lp_maxed_keywords → list of dicts [{{keyword, campaign_id, campaign_name}}]; these keywords are at click ceiling (LP wants more but is capped). Full rendering in Budget Redistribution section.
    lp_summary / lp_top_allocations → OR-Tools LP (maximise ad orders; constraints: C1 global budget, C2 per-campaign budget caps, C3 target ACOS linearised, C4 click floor/ceiling; inventory is NOT a LP constraint — replenishment timing is too unstable to model as a hard bound; eff_cpc = avg_cpc × bidding_strategy_multiplier × placement_multiplier; pessimistic CVR shrinkage (Beta-Binomial) applied for low-sample keywords). lp_orders_bbs_estimate uses Beta-Binomial shrunk CVR (may be < actual_daily_ad_orders — expected). lp_orders_cvr_matched uses un-shrunk AND un-deflated raw CVR — same basis as actual_daily_ad_orders (both keyword-scope, un-deflated). order_gap = lp_orders_cvr_matched − actual_daily_ad_orders is therefore a fair apples-to-apples comparison: positive means LP reallocation gains orders, negative means LP cannot outperform current allocation within budget. actual_daily_ad_orders = spCampaigns ad-attributed orders ÷ days (AD ORDERS ONLY — organic orders not included; true daily total consumption is higher). order_gap = lp_orders_cvr_matched − actual_daily_ad_orders (positive = LP reallocates budget to gain more ad orders; negative — two distinct causes: (1) spend_ceiling_bound=true: click ceilings prevent the LP from using the full budget — order_gap is ceiling-limited, primary action is expand keywords / raise bids; (2) budget_binding=true (lp_optimal_spend ≥ 85% of daily_budget): budget is exhausted and Wilson CVR shrinkage causes LP's estimated orders to fall below actual historical — this is an artifact of pessimistic estimation, NOT evidence the current allocation beats LP; campaign_actions already corrects for this by allowing increase_budget when ACOS is healthy). CRITICAL — lp_zero_keywords does NOT mean 'inefficient'. A keyword is in lp_zero_keywords because the LP allocated 0 clicks to it. There are TWO distinct reasons — you MUST check keyword_acos_pct before labelling:
    (i) Genuinely low ROI: acos_pct > target_acos_applied → LP correctly excluded it. Call it 'above-target ACOS'; recommend pausing or cutting bid.
    (ii) Budget-crowded-out: acos_pct ≤ target_acos_applied AND budget_binding=true → the keyword is EFFICIENT but was excluded because the budget was fully consumed by even-higher-ROI keywords first. Do NOT call it 'inefficient'. Call it 'efficient but crowded out by budget'; recommend increasing total budget.
    FORBIDDEN: never label a keyword 'inefficient' or 'low ROI' if its keyword_acos_pct ≤ target_acos_applied. FORBIDDEN: when the same keyword text appears in multiple campaigns (different campaign_ids), treat each campaign instance separately — ACOS and LP allocation may differ per campaign. Always qualify keywords with their campaign_id when making efficiency or action statements.
    CRITICAL — TWO DISTINCT LP NARRATIVES (never conflate them):
    NARRATIVE A — Reallocation opportunity (order_gap > 0): LP found a better way to distribute the SAME total budget. The gap is caused by ALLOCATION INEFFICIENCY, not budget shortage. Correct framing: 'LP suggests reallocating the existing $X budget could yield +Y orders/day — move spend away from above-target-ACOS keywords toward lp_maxed_keywords (high ROI).' FORBIDDEN when order_gap > 0: do NOT write 'budget constraint is causing the order gap' or 'orders left on table due to budget limit' — the total budget is the SAME; the cause is suboptimal allocation, not insufficient total spend.
    NARRATIVE B — Genuine budget constraint (hold_keyword + budget_binding=true): an efficient keyword (ACOS below target) is starved because the total budget is fully consumed by other keywords. Correct framing: 'Keyword X (campaign Y) is efficient (ACOS $val% < target) but cannot scale — total budget is exhausted; increasing total budget unlocks this keyword.' FORBIDDEN: do NOT conflate NARRATIVE B (need more total budget) with NARRATIVE A (need better allocation). They may both be present, but must be stated separately with distinct root causes.
    When BOTH narratives appear simultaneously, write them as two separate points: '(1) Reallocating the current $X budget per LP plan could gain +Y orders/day (allocation fix — no extra budget needed). (2) Additionally, keyword Z (campaign W) is efficient but budget-constrained — increasing total budget further would unlock Z.'
    CRITICAL — LP budget split (read carefully before writing the Budget section):
    lp_scope_campaign_daily_budget = sum of LP-scope campaign daily budgets — the actual global constraint given to LP. LP cannot spend more than this.
    total_account_daily_budget = sum of ALL enabled campaign daily budgets (LP-scope + non-LP-scope).
    lp_scope_daily_spend = historical daily spend for LP-scope campaigns (what they actually spent).
    non_lp_scope_daily_spend = historical daily spend for non-LP campaigns (auto/PT + untracked keywords).
    lp_optimal_spend = what LP recommends spending across LP-scope keywords.
    FORBIDDEN: do NOT add lp_optimal_spend + non_lp_scope_daily_spend and compare to total_account_daily_budget — these come from SEPARATE campaign budget pools and adding them produces a meaningless number that is always larger than the account budget. The correct comparisons are:
    lp_optimal_spend vs lp_scope_campaign_daily_budget (is LP using its allocated budget?)
    lp_scope_daily_spend vs lp_scope_campaign_daily_budget (did LP-scope campaigns historically hit cap?)
    NOTE: lp_scope_daily_spend > lp_scope_campaign_daily_budget by ≤25% is normal — Amazon's dynamic bidding allows intra-day overspend and the Ads console averages across the month; do NOT flag this as a contradiction.
    non_lp_scope_daily_spend vs (total_account_daily_budget − lp_scope_campaign_daily_budget) (did non-LP campaigns hit their budget cap?)
    budget_source: 'campaign_snapshot' = current campaign budget snapshot; 'historical_avg_spend' = historical_daily_spend × 0.90 used instead because discrepancy exceeded Amazon's 25% daily pacing allowance (structural budget change detected). budget_overage_ratio = historical_daily_spend ÷ campaign_snapshot_budget: ratio ≤ 1.25 is normal Amazon pacing (campaigns regularly hit cap → Amazon allows up to 25% daily overage); ratio > 1.25 indicates campaigns ran at higher budgets during the period (budget was cut recently). When budget_overage_ratio is 1.20–1.25 and budget_source='campaign_snapshot': actual achievable spend ≈ total_account_daily_budget × budget_overage_ratio — mention this in the report as 'Amazon budget pacing: account consistently hits cap, actual spend runs ~X% above set budget'; this is NOT a data error. Do NOT flag budget_overage_ratio ≤ 1.25 as a discrepancy or data quality issue. spend_ceiling_bound=true means click ceilings (C4) are the binding constraint, NOT the budget (lp_optimal_spend < 60% of daily_budget); in this case: (a) lp_zero/maxed keyword signals remain valid as ROI signals; (b) primary recommendation is expand keyword coverage or raise bids (not increase budget). budget_binding=true means the global budget cap is fully consumed; a negative order_gap when budget_binding=true is expected and should NOT be flagged as a caveat. placement_data_unknown=true means all spend was reported under 'UNKNOWN' placement — do NOT make placement-specific recommendations in this case. recommended_stock_units = (organic_daily + lp_orders_cvr_matched) × stock_gate_days — total units required to safely execute the LP plan for stock_gate_days (default 21d) without stockout risk; daily_consumption = organic daily orders + lp_orders_cvr_matched (LP-projected total consumption rate, NOT the same as the rate used for can_sell_days); can_sell_days uses actual historical daily_sales (ad+organic) which is higher than lp_raw_orders alone — so daily_consumption < actual consumption rate is EXPECTED and NOT a contradiction; daily_consumption_source: 'order_metrics' = ad+organic (accurate), 'ad_orders_only' = underestimate (organic excluded — real shortfall is larger); inbound_receiving / inbound_shipped / inbound_working / total_inbound are top-level snapshot fields (not inside lp_summary); confirmed_inbound = inbound_receiving + inbound_shipped (units already in transit, offset against shortfall); inbound_working = shipment plan not yet shipped — NOT counted in confirmed_inbound (arrival timing unknown); stock_shortfall = max(0, recommended_stock_units − total_available − confirmed_inbound) — net units still to procure after accounting for current stock and confirmed inbound; when stock_shortfall > 0: lead with inventory procurement recommendation before bid/budget actions; when reporting: state the full breakdown — current stock X units + inbound_receiving Y units (1-2d) + inbound_shipped Z units (ETA varies) = coverage; if inbound_working > 0, note it separately as 'planned but not shipped — confirm dispatch urgently'; CRITICAL — stock_shortfall=0 AND effective_stock_days < stock_gate_days can BOTH be true simultaneously and is NOT a contradiction: stock_shortfall uses total confirmed pipeline (total_available + inbound_receiving + inbound_shipped) which may cover the 21-day target in aggregate; effective_stock_days uses only near-term confirmed stock (total_available + inbound_receiving, 1-2d ETA) which may fall short of stock_gate_days; when this coexists, write: 'Total pipeline sufficient (stock_shortfall=0), but near-term stock covers only {{effective_stock_days}}d — the inventory gate will clear when inbound_shipped units arrive (ETA 10-30d).'
    campaign_actions → two evaluation paths based on LP scope:
      (a) LP-scoped campaigns (manual keyword targeting with click data): action derived from LP camp_spend vs actual campaign budget; rationale will NOT contain 'outside LP scope'.
      (b) Non-LP-scope campaigns (auto-targeting, product-targeting, or manual with zero click data): action derived from ACOS only — high ACOS → decrease_budget/review_bids, healthy ACOS + saturated → increase_budget, otherwise maintain; rationale will contain '(auto/PT, outside LP scope)'; for high-ACOS auto campaigns recommend adding NEGATIVE keywords/targets, NOT lowering keyword bids; for high-ACOS PT campaigns recommend removing or negating underperforming targets.
    campaign_state field present; action ∈ {{increase_budget, decrease_budget, review_bids, pause_candidate, archive_candidate, enable_and_increase_budget, enable_and_review_bids, maintain}}; priority ∈ {{P0, P1, P2}} — defined as follows and applied uniformly across all action types:
      P0 = Immediate / revenue-blocking: situation is actively losing money or at imminent risk (budget exhausted daily, ACOS > 130% of target, stockout within stock_gate_days). Surface in Top 5; do NOT demote.
      P1 = High-priority / act this week: measurable problem exists but not yet critical (ACOS above target, keyword genuinely inefficient, LP-causal conflict, paused campaign with healthy ACOS). Include in Top 5 unless a conflict rule overrides.
      P2 = Monitor / conditional: no urgent action; revisit when a condition changes (hold_keyword waiting for budget, increase_bid gated by inventory, maintain, insufficient data). Mention as secondary notes; omit from Top 5 if P0/P1 items fill the slots.
    actions prefixed enable_and_* mean campaign is PAUSED — re-enable BEFORE any budget/bid change
    keyword_actions → LP-derived keyword-level recommendations; action ∈ {{pause_keyword, hold_keyword, increase_bid, decrease_bid}}; fields: keyword_text, match_type, campaign_id, keyword_id (Ads API id for direct API call), current_bid, keyword_acos_pct, rationale; pause_keyword: LP assigned 0 clicks AND keyword_acos_pct ≥ target — genuinely inefficient; expected_order_delta (orders/day lost by pausing, negative), expected_spend_delta (spend/day saved, negative); hold_keyword: LP assigned 0 clicks but keyword_acos_pct < target — keyword is EFFICIENT but outcompeted for budget by higher-CVR alternatives; do NOT pause it; monitor and revisit once budget is increased; expected_order_delta / expected_spend_delta show what is currently foregone due to budget constraint; increase_bid: estimated_order_uplift_per_10pct_bid, expected_spend_per_10pct_bid; decrease_bid: expected_order_delta (negative), expected_spend_delta (negative = savings); NOTE on decrease_bid when keyword_acos_pct < target_acos_pct: a decrease_bid on a keyword whose ACOS looks healthy does NOT mean the keyword is underperforming. LP maximises total orders under a budget constraint — it may allocate fewer clicks to a low-ACOS keyword when higher-CVR keywords (even at higher ACOS) produce more orders per dollar. The LP CVR estimate uses Beta-Binomial shrinkage, which can differ from raw observed ACOS. When writing the rationale for such an action, always state: 'LP reallocates clicks to higher-CVR keywords; this keyword ACOS ($val%) is healthy but other keywords generate more orders per dollar under the current budget constraint.' Do NOT imply the keyword is inefficient based on ACOS alone — cite the LP's click allocation logic.
    NOTE on pause_keyword and hold_keyword — THREE CRITICAL RULES:
    (1) Both actions mean LP assigns 0 clicks. Neither implies zero historical orders. FORBIDDEN: do NOT write 'zero orders despite spend', 'no conversions', or 'zero historical orders' unless keyword_acos_pct is null/missing. If keyword_acos_pct or estimated_cvr is present, the keyword HAS historical order data — state it as 'LP allocates 0 clicks in the optimal plan' instead.
    (2) hold_keyword = the keyword is EFFICIENT (ACOS below target) but excluded by budget constraint. NEVER describe it as underperforming, high-ACOS, or problematic. NEVER recommend pausing it. Correct framing: 'Efficient keyword (ACOS $val% < target $t%) held due to budget constraint — do not pause; increase budget to unlock this keyword.' The expected_order_delta / expected_spend_delta fields show current opportunity cost, not waste.
    (3) pause_keyword only appears when keyword_acos_pct ≥ target or keyword_acos_pct is null. Only in these cases is 'inefficient' or 'high ACOS' framing appropriate.
    NOTE on decrease_bid under inventory gate: when lp_summary.stock_gate_days > effective_stock_days AND there are lp_maxed_keywords, a decrease_bid action on a healthy-ACOS keyword is a PREPARATORY action — freed budget will automatically flow to maxed keywords once the inventory gate is cleared (inbound_shipped ETA is logistics-dependent and may clear sooner than estimated). Do NOT flag this as contradictory with the 'want more orders' goal; instead frame it as 'pre-positioning budget reallocation — takes effect when stock gate clears'; campaign_actions: expected_order_delta and expected_spend_delta quantify daily impact
    auto_mining_summary → aggregate stats for auto/PT search-term mining:
      auto_pt_cids_count: number of auto/PT campaigns analyzed
      terms_analyzed: total distinct search terms evaluated
      negative_count / harvest_count: candidates found
      total_wasted_spend / daily_wasted_spend: spend on zero-order terms (negative candidates)
      breakeven_spend: avg_price × target_acos — the max acceptable spend per order
      skipped: true if no auto/PT campaigns identified or no search term data
    auto_mining_beta_prior → Empirical Bayes Beta prior fitted from this ASIN's own search term CVR:
      alpha / beta: shape parameters; implied_cvr_pct = account-level CVR baseline
      n_terms_fitted: number of terms used to fit the prior (≥5 clicks each)
    auto_mining_negatives → negative keyword candidates (full list, up to 30):
      action: 'add_negative_keyword'
      priority: P0 (high confidence) or P1 (directional); gates: Gate A (EB expected_orders ≥ 3.0 → P0, ≥ 1.5 → P1, AND orders=0), Gate B (spend ≥ breakeven×1.5 → P0, ≥ breakeven×0.75 → P1, AND orders=0), Gate C (effective CPO > 3× breakeven → P1, even with orders > 0)
      suggested_match: EXACT (single-word) or PHRASE (multi-word)
      keyword_text, campaign_id, clicks, orders, spend_total, daily_spend, expected_orders_eb, rationale
    auto_mining_harvest → search terms to promote from auto to manual (full list, up to 20):
      action: 'harvest_to_manual'
      priority: P0 (≥5 orders, efficient ACOS) or P1 (2-4 orders, efficient ACOS)
      suggested_match: EXACT; suggested_bid: target_acos × avg_price × Wilson CVR lower bound
      keyword_text, campaign_id, clicks, orders, spend_total, acos_pct, rationale
    competitor_price_meta → credibility metadata for the competitor price dataset:
      n_competitors: number of distinct competitor ASINs sampled
      date_from / date_to: first and last date with price data (YYYY-MM-DD)
      avg_daily_count: average number of competitors with price data per day
    MANDATORY CITATION RULE — competitor price claims: whenever you cite a competitor price (min / max / median from competitor_price_summary), you MUST append sample metadata in parentheses: '(sampled from N competitors, date_from – date_to)'. If competitor_price_meta is null or n_competitors < 3, prefix the claim with '(limited sample — N competitors)' and treat it as directional only, NOT as a strong competitive benchmark. FORBIDDEN: do NOT write '$X vs $Y median' without immediately citing sample size and date range — a bare price comparison without sample metadata is an unsubstantiated claim.
    ad_traffic_ratio / organic_traffic_ratio / traffic_growth_7d → Xiyouzhaoci traffic score API (latest available snapshot). CRITICAL — traffic decline attribution rule: traffic_growth_7d reflects TOTAL traffic (ad + organic combined). When organic_traffic_ratio > 0.70, organic traffic dominates total traffic. In this case, FORBIDDEN: do NOT attribute a total traffic decline primarily to campaign pauses or budget cuts — ad traffic is a minority share and cannot explain a large total traffic drop. Instead, look for organic causes: (a) rating_delta < 0 → lower rating reduces organic click-through rate; (b) price premium vs competitors (price_mean vs competitor_price_summary median) → higher price suppresses organic conversion and search ranking; (c) rank_series showing declining organic rank (higher rank number) → organic position lost. Only when organic_traffic_ratio ≤ 0.30 can campaign pauses/budget cuts be cited as the primary driver of total traffic decline.
    rank_tracked_keywords / rank_series_days / rank_series_history_days → Xiyouzhaoci daily organic rank trends; rank_series_days = days with rank data for the first tracked keyword within data_start_date → data_end_date (reporting window only); rank_series_history_days = total calendar days with rank data across the full historical baseline window (rank_lookback_months, default 6 months) — used for ITS causal baseline and long-term trend context; rank_series_history_days > lookback_days is expected and NOT a data error
    market_trends_keywords → keywords with SFR weekly trend data (Xiyouzhaoci)
    change_attributions_count → change events that passed noise filter (Ads API history, data_start_date → data_end_date)
    causal_consensus_sample → consensus label of first change_attribution entry (ITS + CausalImpact + DML agreement for THAT SPECIFIC EVENT: Strong / Moderate / Weak / Confounded / Conflicting / Skipped). This is PER-EVENT model agreement — entirely separate from causal_reliability:
      causal_reliability = historical calibration quality (how accurate the model has been ACROSS PAST EVENTS)
      causal_consensus_sample = whether the 3 models agree ON THIS SPECIFIC EVENT
    These two can contradict: high causal_reliability + Conflicting consensus is valid and means 'the model is generally well-calibrated, but the 3 models disagree on this particular event — treat this event's causal direction as uncertain'. Do NOT use causal_reliability='high' to override a Conflicting/Weak consensus on a specific event.
    orders_reliability → statistical sufficiency of orders sample: high (≥100 orders), medium (30–99), low (<30)
    acos_ci_lo / acos_ci_hi → 95% ACOS confidence interval (Wilson method on CVR propagated to ACOS via ACOS = spend/sales; see Methodology section)
    backtest_hit_rate → percentage 0–100 (e.g. 85.0 = 85%); fraction of evaluated change events where model-predicted direction matched observed post-window KPI direction; threshold: <70 = near-random (causal_reliability='low'/'none'), ≥70 = reliable ('high')
    backtest_strong_hit_rate → same but restricted to 'Strong evidence' events only
    events_significant_count / events_significant_pct → how many change events in THIS run had at least one model produce a statistically significant result (p<0.05 + CI not crossing zero). events_significant_pct=0.0 means ALL events were insignificant in this run.
    causal_reliability → pre-computed AND-gate tier: 'high' requires BOTH backtest_hit_rate ≥70 AND events_significant_pct > 0; 'low' covers three sub-cases: (A) hit_rate not None and < 70 — calibrated but near-random; (B) hit_rate=None and events_significant_pct==0 — no calibration and no significance; (C) hit_rate=None and events_significant_pct>0 — significant results but no backtest history; 'none' = hit_rate=None or 0 AND events_significant_pct=0 or None — no data at all. Use this field to apply Rule 4 label-downgrade logic

