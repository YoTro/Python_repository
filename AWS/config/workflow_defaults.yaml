# Workflow Default Configurations
# These values are used when no job-level override is provided.
# Override by passing params in the job request.

product_screening:
  # Stage 1: Basic filters
  price_min: 20
  price_max: 40
  weight_min: 20        # grams
  weight_max: 1000      # grams
  rating_min: 4.2
  rating_max: 4.5
  daily_sales_min: 30
  daily_sales_max: 40

  # Stage 2: Competition
  us_seller_ratio_min: 0.80

  # Stage 3: Profitability
  cost_ratio_max: 0.30       # cost < 30% of selling price
  profit_margin_min: 0.30    # profit margin > 30%

  # Stage 4: Compliance
  epa_status_allowed:
    - exempt
    - not_required

  # Stage 5: Advertising
  ad_traffic_ratio_max: 0.20  # BSR >50 ASIN ad traffic < 20%

  # Stage 6: Social media (optional)
  enable_social_analysis: true
  enable_patent_check: true

  # Execution settings
  search_max_pages: 3         # pages to search for candidates
  parallel_concurrency: 5     # max parallel extractor calls

competitor_monitor:
  check_interval_hours: 4
  price_change_alert_pct: 0.10
  stock_drop_alert_pct: 0.50

review_analysis:
  max_reviews_per_product: 100
  sample_positive: 15
  sample_negative: 15
  sample_neutral: 5

bsr_collection:
  max_pages: 2
  categories: []

category_monopoly_analysis:
  # Weights for the 9 dimensions (sum should be 1.0)
  weights:
    sales_curve_top3: 0.15      # CR3: Percentage of sales held by top 3 products
    sales_survival_space: 0.10  # Market share of products ranked 20-50
    brand_concentration: 0.10   # Frequency of the same brand in Top 100
    seller_background: 0.10     # Ratio of Amazon Retail vs 3P sellers
    review_curve: 0.15          # Review disparity and rating barrier
    keyword_traffic: 0.15       # Click share concentration for main keywords (ABA)
    price_compression: 0.05     # Price band convergence (CV)
    ad_traffic_ratio: 0.10      # Percentage of sponsored products
    social_promotion_intensity: 0.05 # Virality score from TikTok
    deal_promotion_intensity: 0.05   # Frequency of deals on sites like Slickdeals

  # Thresholds and markers
  thresholds:
    high_monopoly_score: 75     # Red Ocean: Entry not recommended
    opportunity_score: 40       # Blue Ocean: Significant opportunity
    price_cv_compression: 0.15  # CV < 15% indicates intense price war
    ad_ratio_danger_zone: 0.40  # Ad traffic > 40% indicates high acquisition cost
    cr3_monopoly_limit: 0.60    # Top 3 > 60% share indicates duopoly/oligopoly
    review_disparity_threshold: 5.0 # Top 10 has 5x more reviews than bottom 50
    rating_hard_barrier: 4.5    # Top 10 average rating > 4.5 means no differentiation space
    mega_seller_feedback: 10000 # Feedback count that classifies a seller as an industry giant
