# =============================================================================
# Rate Limiting Configuration
# =============================================================================
#
# Three independent layers, each enforced at a different point in the stack:
#
#   Layer 1  entry_limits   — WHO is requesting
#     Controls per-entry-type global concurrency, per-chat concurrency,
#     and debounce cooldown to prevent Feishu spam/double-clicks.
#     Enforced at:
#       cooldown_seconds  → APIGateway.check_limit()   (before job is queued)
#       concurrent_*      → JobManager._run_job()       (when job starts executing)
#
#   Layer 2  tenant_quotas  — HOW MUCH a tenant can consume
#     Daily request budget per plan tier.
#     Extension point for future SaaS billing.
#     Enforced at: APIGateway.check_limit()  (before job is queued)
#
#   Layer 3  source_limits  — PROTECTING external APIs
#     Token-bucket throttling per third-party API.
#     Prevents account bans and risk-control triggers.
#     Enforced at: each API client._request()  via acquire_source()
#
# Scaling notes:
#   Single-user mode : tenant_quotas has no practical effect (tenant = "default")
#   Multi-tenant SaaS: swap the in-memory daily counter in RateLimiter for Redis
#   Adding a new API : add an entry under source_limits and call
#                      RateLimiter().acquire_source("<name>") in the client
# =============================================================================


# -----------------------------------------------------------------------------
# Layer 1: Entry-point limits
# -----------------------------------------------------------------------------
# Fields:
#   concurrent_jobs     — max jobs of this type running globally at once (0 = unlimited)
#   per_chat_concurrent — max job slots held by a single Feishu chat at once (0 = unlimited)
#   cooldown_seconds    — minimum gap between two triggers from the same chat (0 = no debounce)
#
# Design rationale:
#   CLI        : human-operated, no debounce needed, concurrency is relaxed
#   feishu_*   : can be triggered rapidly by scripts or impatient users — needs protection
#   feishu_explore (Agent mode) : heavier than workflow, stricter limits
# -----------------------------------------------------------------------------
entry_limits:

  cli_workflow:
    concurrent_jobs: 5          # up to 5 parallel CLI workflows
    cooldown_seconds: 0         # no debounce — human-operated

  feishu_workflow:
    concurrent_jobs: 10         # global Feishu workflow concurrency cap
    per_chat_concurrent: 2      # each chat group may hold at most 2 active job slots
    cooldown_seconds: 5         # 5 s debounce per chat — prevents double-clicks

  feishu_explore:
    concurrent_jobs: 3          # Agent mode is resource-heavy; tight global cap
    per_chat_concurrent: 1      # only 1 active Agent job per chat at a time
    cooldown_seconds: 15        # 15 s debounce — Agent responses are slow anyway


# -----------------------------------------------------------------------------
# Layer 2: Tenant daily quotas
# -----------------------------------------------------------------------------
# Fields:
#   daily_requests — max requests a single tenant may dispatch per calendar day (UTC)
#                    Requests blocked by cooldown are NOT counted against this quota.
#
# Notes:
#   - In single-user mode tenant_id is always "default"; quota has no practical effect.
#   - enterprise uses a large finite value instead of -1 to preserve audit-log capability.
# -----------------------------------------------------------------------------
tenant_quotas:

  free:
    daily_requests: 50          # free tier: 50 requests / day

  pro:
    daily_requests: 500         # pro tier: 500 requests / day

  enterprise:
    daily_requests: 999999      # enterprise: effectively unlimited, audit log preserved


# -----------------------------------------------------------------------------
# Layer 3: External API source limits (token bucket)
# -----------------------------------------------------------------------------
# Fields:
#   requests_per_minute — steady-state refill rate (tokens / minute)
#   burst               — bucket capacity; allows short bursts (e.g. parallel ASIN lookups)
#
# Algorithm: Token Bucket
#   - Bucket starts full (tokens = burst).
#   - Each call consumes 1 token; if empty, the caller blocks until a token refills
#     (up to a 30 s timeout, after which RetryableError is raised).
#   - Refill rate = requests_per_minute / 60  (tokens / second)
#
# Tuning guide:
#   Known rate limit   : set to ~70% of the official limit (safety margin)
#   Unknown rate limit : start conservative, relax after observing ban patterns
#   burst              : typically 10–20% of rpm; enough for batch parallel calls
# -----------------------------------------------------------------------------
source_limits:

  xiyouzhaoci:
    requests_per_minute: 30     # official limit unknown — conservative default
    burst: 5                    # supports short parallel ASIN / keyword bursts

  sellersprite:
    requests_per_minute: 20     # extension-type API — stay conservative
    burst: 3

  crawler:
    requests_per_minute: 6      # 1 req / 10 s — minimises Amazon risk-control exposure
    burst: 2                    # tiny burst to avoid sudden traffic spikes

  amazon_ads:
    requests_per_minute: 100    # Ads API has a relatively generous official limit
    burst: 20                   # larger burst for batch ad-data pulls

  tiktok:
    requests_per_minute: 12     # unauthenticated WAF is aggressive — stay well under threshold
    burst: 3                    # small burst; TikTok bans IPs quickly on spikes
