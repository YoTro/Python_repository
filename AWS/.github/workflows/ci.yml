name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e .

      - name: Import integrity (circular import detection)
        run: PYTHONPATH=. pytest tests/test_imports.py -v --tb=short

      - name: Unit tests (no live services)
        # Runs the full test suite minus anything marked live or redis.
        # New tests are included automatically; no manual file list to maintain.
        run: PYTHONPATH=. pytest tests/ -m "not live and not redis" -v --tb=short

      - name: Rate limiting (all three layers)
        # unittest-based; run separately to preserve verbose output format
        run: PYTHONPATH=. python -m unittest tests/test_rate_limiting_system.py -v

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies + dev extras
        run: pip install -e ".[dev]"

      - name: mypy — core layer
        # Scope: src/core/ is the stable, well-typed foundation.
        # Expand to src/gateway/ src/workflows/ etc. as annotations improve.
        run: mypy src/core/

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: bandit — src/
        # Flags: -ll (medium+ severity), -ii (medium+ confidence), -c (pyproject.toml config).
        # Skips: B305 (ECB — Lingxing API), B324 (MD5 — cache keys / protocol signatures).
        run: bandit -r src/ -ll -ii -c pyproject.toml
