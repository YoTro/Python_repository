name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies (dev extras)
        run: pip install -e ".[dev]"

      - name: Import integrity (circular import detection)
        run: PYTHONPATH=. pytest tests/test_imports.py -v --tb=short

      - name: Unit tests (no live services)
        # Runs the full test suite minus anything marked live or redis.
        # test_rate_limiting_system.py is excluded (RateLimiter singleton needs isolation).
        run: >
          PYTHONPATH=. pytest tests/ -m "not live and not redis" -v --tb=short
          --cov=src --cov-report=xml --cov-report=term-missing

      - name: Rate limiting (all three layers)
        # Runs in isolation — RateLimiter is a singleton and leaks state across
        # test classes when collected alongside other test files.
        run: PYTHONPATH=. python -m unittest tests/test_rate_limiting_system.py -v

      - name: Upload coverage to Codecov
        # Only upload once — from the Python 3.11 runner — to avoid duplicate reports.
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false   # don't break the build if Codecov is unreachable

  pre-commit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: pre-commit/action@v3.0.1
        env:
          # ruff and mypy have dedicated CI jobs — skip here to avoid duplication.
          # Remaining hooks: trailing-whitespace, end-of-file-fixer, check-yaml,
          # check-toml, check-json, check-added-large-files, debug-statements,
          # check-merge-conflict.
          SKIP: ruff,ruff-format,mypy

  docs:
    name: Docs (markdownlint + link-check)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

      - name: markdown link check
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "yes"
          config-file: ".markdown-link-check.json"
          folder-path: "."
          file-extension: ".md"

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"

      - uses: astral-sh/ruff-action@v3
        with:
          args: "format --check"

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies + dev extras
        run: pip install -e ".[dev]"

      - name: mypy — core layer
        # Scope: src/core/ is the stable, well-typed foundation.
        # Expand to src/gateway/ src/workflows/ etc. as annotations improve.
        run: mypy src/core/ --follow-imports=silent

  secret-scan:
    name: Secret Scanning (gitleaks)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history — gitleaks scans every commit, not just HEAD

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE required only for private repos — set in repo secrets if needed

  security:
    name: Security (bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: bandit — src/
        # Flags: -ll (medium+ severity), -ii (medium+ confidence), -c (pyproject.toml config).
        # Skips: B305 (ECB — Lingxing API), B324 (MD5 — cache keys / protocol signatures).
        run: bandit -r src/ -ll -ii -c pyproject.toml
